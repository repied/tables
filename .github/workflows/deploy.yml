name: Deploy App

on:
  push:
    branches:
      - main # Deploys to production
      - 'exp-*' # Deploys to experiment folders
      - 'feature-*'

concurrency:
  group: gh-pages
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Prettier Check
        run: npm run format:check

      - name: Extract short Git SHA and date
        id: vars
        run: |
          echo "VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "NOW=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Inject Version and date into files
        run: |
          sed -i "s/{{APP_VERSION}}/${{ steps.vars.outputs.VERSION }}/g" index.html
          sed -i "s/{{APP_VERSION}}/${{ steps.vars.outputs.VERSION }}/g" sw.js
          sed -i "s/{{APP_VERSION_DATE}}/${{ steps.vars.outputs.NOW }}/g" index.html

      - name: Get Playwright version
        id: playwright-version
        if: github.ref == 'refs/heads/main'
        run: echo "PLAYWRIGHT_VERSION=$(node -p 'require("@playwright/test/package.json").version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        if: github.ref == 'refs/heads/main'
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: github.ref == 'refs/heads/main'
        run: npx playwright install chromium --with-deps

      - name: Run Tests
        if: github.ref == 'refs/heads/main'
        run: npm run test

      - name: Generate Experiments Index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/update-experiments-index.sh

      - name: Determine Deployment Path
        id: deploy_path
        run: |
          echo "DEBUG: GITHUB_REF is $GITHUB_REF"
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            echo "DEST_DIR=." >> $GITHUB_OUTPUT
          else
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            echo "DEST_DIR=$BRANCH_NAME" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          destination_dir: ${{ steps.deploy_path.outputs.DEST_DIR }}
          keep_files: true
