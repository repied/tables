<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="0;url=https://planif.plongee.app/">
    <title>Redirecting...</title>
</head>
<body>
    <script>
        navigator.serviceWorker.getRegistrations()
            .then(regs => Promise.all(regs.map(r => r.unregister())))
            .then(() => caches.keys())
            .then(keys => Promise.all(keys.map(k => caches.delete(k))))
            .then(() => window.location.replace('https://planif.plongee.app/'));
    </script>
</body>
</html>
